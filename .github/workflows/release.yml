name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Bundle (minify)
        run: npm run bundle:minify

      - name: Rename bundle
        run: mv dist/CommandBuilder_bundle.lua "dist/CommandBuilder-${{ github.ref_name }}.min.lua"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CommandBuilder-${{ github.ref_name }}.min.lua
          generate_release_notes: true
